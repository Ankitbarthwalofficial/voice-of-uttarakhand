<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>वॉइस ऑफ उत्तराखंड</title>
    <style>
        :root { --primary: #1b4332; --bg: #fdfaf6; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 0; }
        header { background: var(--primary); color: white; padding: 50px 20px; text-align: center; cursor: pointer; }
        .container { max-width: 800px; margin: -30px auto 50px; padding: 0 15px; }
        .card { background: white; margin-bottom: 20px; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-right: 6px solid var(--primary); cursor: pointer; }
        h2 { color: var(--primary); margin-top: 0; }
        #article-view { display: none; background: white; padding: 30px; border-radius: 12px; }
        .back-btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-bottom: 20px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<header onclick="location.reload()">
    <h1>⛰️ वॉइस ऑफ उत्तराखंड</h1>
    <p>देवभूमि की हर खबर, आप तक</p>
</header>

<div class="container">
    <div id="news-feed">
        <div class="card" onclick="showStory('खबर 1', 'चारधाम यात्रा की तैयारियां जोरों पर हैं। प्रशासन ने रास्ते खोलने का काम शुरू कर दिया है।')">
            <h2>बद्रीनाथ मार्ग पर बर्फ हटाने का काम शुरू</h2>
            <p>9 मार्च, 2026 • क्लिक करके पूरी खबर पढ़ें...</p>
        </div>
        <div class="card" onclick="showStory('खबर 2', 'उत्तराखंड के पहाड़ी इलाकों में इस बार सेब की फसल बहुत अच्छी होने की उम्मीद है।')">
            <h2>हर्षिल में सेब की बंपर पैदावार</h2>
            <p>8 मार्च, 2026 • क्लिक करके पूरी खबर पढ़ें...</p>
        </div>
    </div>

    <div id="article-view">
        <button class="back-btn" onclick="location.reload()">← वापस जाएं</button>
        <h1 id="view-title"></h1>
        <hr>
        <p id="view-content" style="font-size: 1.2rem; line-height: 1.8;"></p>
    </div>
</div>

<script>
    function showStory(title, content) {
        document.getElementById('news-feed').classList.add('hidden');
        document.getElementById('article-view').style.display = 'block';
        document.getElementById('view-title').innerText = title;
        document.getElementById('view-content').innerText = content;
        window.scrollTo(0,0);
    }
</script>

</body>
</html>
