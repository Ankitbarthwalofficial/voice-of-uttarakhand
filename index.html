<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>वॉइस ऑफ उत्तराखंड - देवभूमि की आवाज़</title>
    <style>
        :root {
            --primary: #1b4332; 
            --accent: #d4a373;  
            --bg: #fdfaf6;
            --card-bg: #ffffff;
            --text: #2d3436;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.8;
        }

        header {
            background: linear-gradient(rgba(27, 67, 50, 0.85), rgba(27, 67, 50, 0.85)), 
                        url('https://images.unsplash.com/photo-1626621341517-bbf3d9990a23?auto=format&fit=crop&w=800&q=80');
            background-size: cover;
            background-position: center;
            color: white;
            padding: 3.5rem 1rem;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            cursor: pointer;
        }

        header h1 { font-size: 2.8rem; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        header p { font-size: 1.2rem; opacity: 0.9; }

        .container {
            max-width: 850px;
            margin: -2.5rem auto 3rem auto;
            padding: 0 15px;
        }

        .news-card {
            background: var(--card-bg);
            margin-bottom: 25px;
            border-radius: 15px;
            overflow: hidden;
            border-right: 6px solid var(--primary);
            box-shadow: 0 5px 15px rgba(0,0,0,0.06);
            transition: 0.3s ease;
            cursor: pointer;
            padding: 20px;
        }

        .news-card:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }

        .category-tag {
            background: var(--accent);
            color: #fff;
            padding: 3px 12px;
            border-radius: 5px;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .news-card h2 { margin: 15px 0 10px 0; color: var(--primary); font-size: 1.6rem; line-height: 1.4; }
        .date { font-size: 0.9rem; color: #777; margin-bottom: 10px; display: block; }

        #article-view { display: none; background: white; padding: 35px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        
        .back-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 30px;
            cursor: pointer;
            margin-bottom: 25px;
            font-size: 1rem;
            font-weight: bold;
        }

        footer { 
            background: #1b4332; 
            color: white; 
            text-align: center; 
            padding: 40px 20px; 
            margin-top: 50px; 
        }

        .hidden { display: none !important; }
        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
    </style>
</head>
